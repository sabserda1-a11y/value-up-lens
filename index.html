<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Value-up Lens V2 | Real-time Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* CSS 내부의 @import를 제거하고 폰트 패밀리만 설정합니다 */
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            background-color: #f1f5f9; 
            padding: 20px; 
        }
    </style>
</head>
<body>

    <div class="max-w-5xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <div class="flex-1 w-full">
                    <label class="text-xs font-bold text-gray-400 uppercase mb-1 block">Stock Code Search</label>
                    <input type="text" id="stockSearch" placeholder="종목코드 입력 (현대차: 005380, 삼성전자: 005930)" 
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <button id="searchBtn" onclick="updateStock()" class="w-full md:w-32 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition mt-5">
                    분석하기
                </button>
            </div>
            <p class="text-xs text-gray-400 mt-2">* 실제 데이터를 위해 '005380' 같은 숫자를 입력하세요.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="displayStockName" class="text-2xl font-bold text-gray-800">대기 중...</h2>
                        <p id="displayPrice" class="text-4xl font-extrabold tracking-tight mt-2">- 원</p>
                    </div>
                    <div class="text-right">
                        <div id="signalLight" class="inline-block px-4 py-1 rounded-full text-xs font-black mb-2 bg-gray-100 text-gray-400">분석 전</div>
                        <div class="flex items-baseline justify-end gap-1">
                            <span id="valueScore" class="text-5xl font-black text-indigo-600">0</span>
                            <span class="text-gray-400 font-bold">점</span>
                        </div>
                    </div>
                </div>
                <div class="h-[350px]">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">📊 실제 퀀트 데이터</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">현재 PBR</span>
                            <span id="statPbr" class="font-bold text-gray-800">- 배</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-500">ROE (자기자본이익률)</span>
                            <span id="statRoe" class="font-bold text-green-600">- %</span>
                        </div>
                    </div>
                </div>

                <div class="bg-indigo-50 p-6 rounded-3xl border border-indigo-100">
                    <h3 class="font-bold text-indigo-900 mb-3 text-sm">리코더의 최종 전략</h3>
                    <p id="recorderGuide" class="text-sm text-indigo-700 leading-relaxed">
                        종목 코드를 입력하고 분석하기를 눌러주세요.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-50 hidden flex-col items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl flex flex-col items-center max-w-sm w-full mx-4">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mb-4"></div>
            <h3 class="text-lg font-bold text-gray-800 mb-2">분석 엔진 가동 중</h3>
            <p id="loadingMessage" class="text-sm text-gray-500 text-center">서버가 깨어나는 중입니다. 잠시만 기다려주세요...</p>
            <div class="w-full bg-gray-200 rounded-full h-1.5 mt-4 overflow-hidden">
                <div class="bg-indigo-600 h-1.5 animate-pulse w-full"></div>
            </div>
        </div>
    </div>

    <script>
        let myChart;
        let isCoolingDown = false;
        const COOL_DOWN_TIME = 8000;

        // 로딩 메시지 순차 변경 함수
        function rotateMessages() {
            const messages = [
                "분석 엔진을 가동하는 중입니다...",
                "실시간 재무 데이터를 수집하고 있습니다.",
                "퀀트 알고리즘으로 적정 가치를 계산 중입니다.",
                "거의 다 되었습니다! 차트를 생성하고 있습니다."
            ];
            let i = 0;
            return setInterval(() => {
                document.getElementById('loadingMessage').innerText = messages[i % messages.length];
                i++;
            }, 3000);
        }

    // 메인 분석 실행 함수
    async function updateStock() {
    const queryInput = document.getElementById('stockSearch');
    const btn = document.getElementById('searchBtn');
    const query = queryInput.value.trim();

    if (!query) {
        alert("종목코드(예: 005380)를 입력해주세요!");
        return;
    }
    if (isCoolingDown) {
        alert("분석 엔진이 식는 중입니다. 8초만 기다려주세요! ☕");
        return;
    }

    // 🌟 [신규 추가] 주소창을 '?code=검색어' 형태로 새로고침 없이 변경합니다!
    const newUrl = window.location.pathname + "?code=" + encodeURIComponent(query);
    window.history.pushState({ path: newUrl }, '', newUrl);


            // 2. 로딩 화면 시작
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            const msgInterval = rotateMessages();

            try {
                // 쿨타임 및 버튼 제어 시작
                isCoolingDown = true;
                btn.disabled = true;
                btn.innerText = "분석 중...";

                // [중요] 백엔드 주소 (Render 주소 확인 필수)
                const url = `https://value-up-lens.onrender.com/api/stock/${encodeURIComponent(query)}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || "서버 응답 에러");
                }
                
                const data = await response.json();

                // 3. UI 업데이트
                // --- UI 데이터 업데이트 (HTML ID 완벽 매칭 버전) ---
                const currency = data.currency || "원";

                // 1. 종목명과 가격
                const nameEl = document.getElementById('displayStockName');
                if (nameEl) nameEl.innerText = data.name || "알 수 없는 종목";

                const priceEl = document.getElementById('displayPrice');
                if (priceEl) priceEl.innerText = (data.price || "0") + " " + currency;

                // 2. 퀀트 데이터 (PBR, ROE)
                const pbrEl = document.getElementById('statPbr'); 
                if (pbrEl) pbrEl.innerText = data.pbr ? data.pbr + " 배" : "N/A";

                const roeEl = document.getElementById('statRoe');
                if (roeEl) roeEl.innerText = data.roe ? data.roe + " %" : "N/A";

                // 3. 가치 평가 점수
                const scoreEl = document.getElementById('valueScore');
                if (scoreEl) scoreEl.innerText = data.score || 50; // '점'은 HTML 뼈대에 이미 있어서 숫자만 넣습니다.

                // 차트 업데이트
                updateChart(data.trend, data.dates, data.currency);
                updateGuideByScore(data.score, data.name);

            } catch (error) {
                alert("분석 실패: " + error.message);
                document.getElementById('recorderGuide').innerText = "정확한 종목코드를 확인해주세요.";
            } finally {
                // 4. 로딩 끄기 및 쿨타임 해제 예약
                clearInterval(msgInterval);
                overlay.classList.remove('flex');
                overlay.classList.add('hidden');

                setTimeout(() => {
                    isCoolingDown = false;
                    btn.disabled = false;
                    btn.innerText = "분석하기";
                }, COOL_DOWN_TIME);
            }
        }

        function updateGuideByScore(score, name) {
            const light = document.getElementById('signalLight');
            const guide = document.getElementById('recorderGuide');
            
            if (score >= 80) {
                light.innerText = "적극 매수";
                light.className = "inline-block px-4 py-1 rounded-full text-xs font-black mb-2 bg-green-100 text-green-700";
                guide.innerText = `현재 ${name}는 밸류업 매력이 매우 높습니다. 저평가 구간이 확실하니 공격적인 비중 확대를 고려하세요.`;
            } else if (score >= 50) {
                light.innerText = "보유/관망";
                light.className = "inline-block px-4 py-1 rounded-full text-xs font-black mb-2 bg-yellow-100 text-yellow-700";
                guide.innerText = `${name}는 적정 가치 구간에 진입했습니다. 추가적인 이익 성장을 확인하며 분할 매수로 대응하세요.`;
            } else {
                light.innerText = "주의/고평가";
                light.className = "inline-block px-4 py-1 rounded-full text-xs font-black mb-2 bg-red-100 text-red-700";
                guide.innerText = `현재 가치 대비 고평가 상태입니다. 무리한 진입보다는 조정을 기다리거나 다른 저평가주를 찾아보세요.`;
            }
        }

// 🌟 파라미터에 currency를 추가하고, 기본값을 '원'으로 둡니다.
function updateChart(trendData, dateData, currency = "원") {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (myChart) myChart.destroy();

    const safeTrend = (trendData && trendData.length > 0) ? trendData : [0, 0, 0, 0, 0];
    const safeDates = (dateData && dateData.length === safeTrend.length) ? dateData : safeTrend.map((_, i) => i + 1);

    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: safeDates,
            datasets: [{
                label: '종가',
                data: safeTrend,
                borderColor: '#4f46e5',
                borderWidth: 3,
                tension: 0.3,
                pointRadius: 0,
                pointHoverRadius: 6,
                fill: true,
                backgroundColor: 'rgba(79, 70, 229, 0.05)'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false,
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                    titleFont: { size: 13, family: 'Pretendard' },
                    bodyFont: { size: 15, weight: 'bold', family: 'Pretendard' },
                    padding: 12,
                    displayColors: false,
                    callbacks: {
                        label: function(context) {
                            // 🌟 핵심 마법: 하드코딩된 '원'을 지우고 currency 변수를 붙입니다!
                            return context.parsed.y.toLocaleString() + ' ' + currency;
                        }
                    }
                }
            },
            scales: {
                x: { display: false },
                y: { grid: { color: '#f1f5f9' } }
            }
        }
    });
}
// 초기 화면 설정 (주소창 분석 및 엔터키 기능 탑재)
window.onload = () => {
    // 🌟 [신규] 검색창에서 엔터키를 누르면 자동으로 updateStock() 실행!
    document.getElementById('stockSearch').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            updateStock();
        }
    });

    // 1. 현재 주소창에서 '?code=' 뒤에 있는 글자를 가져옵니다.
    const urlParams = new URLSearchParams(window.location.search);
    const codeFromUrl = urlParams.get('code');

    // 2. 주소창에 코드가 있으면 그걸 검색창에 넣고, 없으면 기본값(현대차)을 넣습니다.
    if (codeFromUrl) {
        document.getElementById('stockSearch').value = codeFromUrl;
    } else {
        document.getElementById('stockSearch').value = "005380";
    }

    // 3. 세팅된 값으로 바로 자동 검색을 실행합니다!
    updateStock();
};
    </script>
</body>
</html>
